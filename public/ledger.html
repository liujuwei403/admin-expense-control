<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快提快报 - 费用台账</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar" id="topbar"></header>
  <main class="main">
    <div class="card">
      <div class="filter-bar">
        <select class="form-select" id="filterType"><option value="">全部类型</option></select>
        <select class="form-select" id="filterProgress">
          <option value="">全部进度</option>
          <option>费控提报中</option>
          <option>费控提报完成</option>
          <option>已驳回待修改</option>
          <option>已撤回</option>
        </select>
        <select class="form-select" id="filterOverdue">
          <option value="">全部状态</option><option>逾期</option><option>正常</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>编号</th><th>费用类型</th><th>场景</th><th>金额</th>
            <th>进度</th><th>提交人</th><th>操作</th>
          </tr></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-text">暂无台账记录</div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    if (!requireLogin()) throw '';
    renderNav('ledger.html');

    let allLedgers = [];

    (async () => {
      try {
        allLedgers = await teableGet(TABLE_LEDGER);
        const types = [...new Set(allLedgers.map(r => r.fields['费用类型']).filter(Boolean))];
        const filterType = document.getElementById('filterType');
        types.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t; opt.textContent = t;
          filterType.appendChild(opt);
        });
        renderTable();
      } catch (e) {
        showToast('加载台账失败: ' + e.message, 'error');
      }
    })();

    document.getElementById('filterType').addEventListener('change', renderTable);
    document.getElementById('filterProgress').addEventListener('change', renderTable);
    document.getElementById('filterOverdue').addEventListener('change', renderTable);

    function renderTable() {
      const fType = document.getElementById('filterType').value;
      const fProgress = document.getElementById('filterProgress').value;
      const fOverdue = document.getElementById('filterOverdue').value;

      let data = allLedgers;
      if (fType) data = data.filter(r => r.fields['费用类型'] === fType);
      if (fProgress) data = data.filter(r => r.fields['当前进度'] === fProgress);
      if (fOverdue) data = data.filter(r => checkOverdue(r) === fOverdue);

      data.sort((a, b) => (b.fields['编号'] || 0) - (a.fields['编号'] || 0));

      if (data.length === 0) {
        document.getElementById('ledgerBody').innerHTML = '';
        document.getElementById('emptyState').style.display = '';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      const user = getCurrentUser();
      document.getElementById('ledgerBody').innerHTML = data.map(r => {
        const f = r.fields;
        const od = checkOverdue(r);
        const progress = f['当前进度'];
        const OLD_TERMINAL = ['已付款','待付款','预提完成','待收账单','已收账单','待预提'];
        const terminated = progress === '已撤回' || progress === '费控提报完成' || OLD_TERMINAL.includes(progress);
        const canWithdraw = !terminated && (user.account === f['提交人'] || isAdmin());
        const actionBtns = canWithdraw
          ? `<button class="btn btn-sm btn-danger" onclick="withdrawRecord('${r.id}')">撤回</button>`
          : '-';
        return `<tr>
          <td>${f['编号'] || '-'}</td>
          <td>${f['费用类型'] || '-'}</td>
          <td>${f['费用场景说明'] || '-'}</td>
          <td>${formatMoney(f['付款金额'])}</td>
          <td>${statusBadge(f['当前进度'])}</td>
          <td>${f['提交人'] || '-'}</td>
          <td style="white-space:nowrap">${actionBtns}</td>
        </tr>`;
      }).join('');
    }

    async function withdrawRecord(id) {
      const record = allLedgers.find(r => r.id === id);
      if (!record) return;
      const f = record.fields;
      const user = getCurrentUser();
      if (f['当前进度'] === '费控提报完成' || f['当前进度'] === '已撤回') return;
      if (user.account !== f['提交人'] && !isAdmin()) { showToast('无权限撤回', 'error'); return; }
      if (!confirm(`确认撤回编号 ${f['编号']} 的费用提报？`)) return;
      try {
        await teableUpdate(TABLE_LEDGER, id, {
          '当前进度': '已撤回',
          '备注': (f['备注'] ? f['备注'] + ' | ' : '') + `撤回于 ${new Date().toLocaleString('zh-CN')}`,
        });
        showToast('已撤回');
        trackAction('撤回台账:' + f['编号'], 'ledger.html');
        allLedgers = await teableGet(TABLE_LEDGER, true);
        renderTable();
      } catch (e) {
        showToast('撤回失败: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
