<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快提快报 - 费用提报</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar" id="topbar"></header>
  <main class="main">
    <div class="card">

      <!-- 1. 场景选择 -->
      <div class="form-section">
        <div class="form-section-title">场景选择</div>
        <div id="noPermissionHint" style="display:none;padding:10px 14px;background:#fff4e5;border:1px solid #ffb020;border-radius:6px;color:#7a4a00;font-size:13px;margin-bottom:10px">
          您当前工号未关联任何场景（负责人或跟进人），暂无提报权限。如需权限请联系管理员。
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">费用类型<span class="required">*</span></label>
            <select class="form-select" id="s_type" disabled>
              <option value="">加载中...</option>
            </select>
          </div>
          <div class="form-group" id="sceneOptionsGroup" style="display:none">
            <label class="form-label">场景说明<span class="required">*</span></label>
            <div class="scene-options" id="sceneOptions"></div>
          </div>
        </div>
      </div>

      <!-- 总费用 -->
      <div class="total-fee-bar" id="totalFeeBar" style="display:none">
        <span>合计总费用</span>
        <strong id="totalFeeAmount">¥0.00</strong>
        <span id="totalFeeCount" style="font-size:12px;color:var(--text-muted)"></span>
      </div>

      <!-- 动态场景表单块容器 -->
      <div id="sceneBlocksScroll">
        <div class="scene-blocks-container" id="sceneBlocksContainer"></div>
      </div>

      <!-- 2. 其他设置（共享，折叠） -->
      <details class="form-section collapsible" style="border-bottom:none">
        <summary class="form-section-title">
          <span class="collapse-caret">&#9656;</span>
          其他设置
        </summary>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">是否预提</label>
            <select class="form-select" id="s_isAccrual"><option selected>否</option><option>是</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">类型</label>
            <select class="form-select" id="s_splitType"><option selected>普通</option><option>分摊</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">纸质单据</label>
            <select class="form-select" id="s_paper"><option selected>否</option><option>是</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">是否员工垫付</label>
            <select class="form-select" id="s_selfPay"><option selected>否</option><option>是</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">付款方式</label>
            <select class="form-select" id="s_payMethod"><option selected>CBS网银</option><option>其他</option></select>
          </div>
        </div>
      </details>

      <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border)">
        <button class="btn btn-ghost" onclick="location.href='home.html'">取消</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitExpense()">提交费用</button>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    if (!requireLogin()) throw '';
    renderNav('submit.html');

    let configRecords = [];
    let selectedSceneIds = [];
    let invoiceFiles = {};   // sceneId → File
    let attachFiles = {};    // sceneId → File
    let ocrRawResults = {};  // sceneId → string
    const debouncedLLM = {};
    const extraFkFieldNames = {}; // { sid: ['字段名', ...] } 场景配置表中超出已知字段的额外映射字段

    // ─── 工具 ────────────────────────────────────────────────────
    function getSceneSid(id) {
      return id.replace(/[^a-z0-9]/gi, '_');
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ─── 加载配置数据 & 填充费用类型 ───────────────────────────────
    function extractWorkcode(title) {
      if (!title) return '';
      const idx = title.lastIndexOf('-');
      return idx >= 0 ? title.slice(idx + 1) : '';
    }

    function isScenarioVisible(record, myWorkcode) {
      const f = record.fields;
      const owner = f['负责人'];
      if (owner && extractWorkcode(owner.title) === myWorkcode) return true;
      const followers = Array.isArray(f['跟进人']) ? f['跟进人'] : [];
      return followers.some(u => u && extractWorkcode(u.title) === myWorkcode);
    }

    function showNoPermissionHint() {
      document.getElementById('noPermissionHint').style.display = 'block';
      document.getElementById('s_type').disabled = true;
    }

    (async () => {
      try {
        const allRecords = await loadConfigRecords();
        if (isApprover()) {
          configRecords = allRecords;
        } else {
          const sso = getSavedSSO();
          const myWorkcode = sso && sso.payload && sso.payload.workcode;
          configRecords = myWorkcode
            ? allRecords.filter(r => isScenarioVisible(r, myWorkcode))
            : [];
        }
        populateFeeTypeDropdown();
        if (configRecords.length === 0 && !isApprover()) {
          showNoPermissionHint();
        }
      } catch (e) {
        showToast('加载配置数据失败: ' + e.message, 'error');
      }
    })();

    function populateFeeTypeDropdown() {
      const types = [...new Set(configRecords.map(r => r.fields['费用类型']).filter(Boolean))];
      const sel = document.getElementById('s_type');
      sel.innerHTML = '<option value="">请选择费用类型</option>' +
        types.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.disabled = false;
    }

    // ─── 费用类型 change → 清空场景 & 渲染 pills ──────────────────
    document.getElementById('s_type').addEventListener('change', function() {
      [...selectedSceneIds].forEach(id => {
        const block = document.getElementById('scene-block-' + getSceneSid(id));
        if (block) block.remove();
      });
      selectedSceneIds = [];
      invoiceFiles = {};
      attachFiles = {};
      ocrRawResults = {};

      const group = document.getElementById('sceneOptionsGroup');
      if (this.value) {
        group.style.display = 'flex';
        renderSceneOptions();
      } else {
        group.style.display = 'none';
        document.getElementById('sceneOptions').innerHTML = '';
      }
    });

    function renderSceneOptions() {
      const feeType = document.getElementById('s_type').value;
      const container = document.getElementById('sceneOptions');
      const filtered = configRecords.filter(r => r.fields['费用类型'] === feeType);
      if (filtered.length === 0) {
        container.innerHTML = '<span style="font-size:13px;color:var(--text-muted)">无可用场景</span>';
        return;
      }
      container.innerHTML = filtered.map(r => {
        const name = escHtml(r.fields['场景说明'] || '-');
        const checked = selectedSceneIds.includes(r.id) ? 'checked' : '';
        const cls = selectedSceneIds.includes(r.id) ? ' checked' : '';
        return `<label class="scene-option-label${cls}" id="scene-opt-${getSceneSid(r.id)}">
          <input type="checkbox" value="${r.id}" ${checked} onchange="toggleScene('${r.id}', this.checked)">
          ${name}
        </label>`;
      }).join('');
    }

    function toggleScene(sceneId, checked) {
      if (checked) addScene(sceneId);
      else removeScene(sceneId);
    }

    function addScene(sceneId) {
      if (selectedSceneIds.includes(sceneId)) return;
      const record = configRecords.find(r => r.id === sceneId);
      if (!record) return;
      selectedSceneIds.push(sceneId);

      const lbl = document.getElementById('scene-opt-' + getSceneSid(sceneId));
      if (lbl) lbl.classList.add('checked');

      const container = document.getElementById('sceneBlocksContainer');
      const div = document.createElement('div');
      div.innerHTML = renderSceneBlock(record);
      container.appendChild(div.firstElementChild);

      setupUploadZone(sceneId, getSceneSid(sceneId));
      updateBlocksLayout();
      updateTotalFee();
    }

    function removeScene(sceneId) {
      const idx = selectedSceneIds.indexOf(sceneId);
      if (idx < 0) return;
      selectedSceneIds.splice(idx, 1);

      const sid = getSceneSid(sceneId);
      const block = document.getElementById('scene-block-' + sid);
      if (block) block.remove();

      delete invoiceFiles[sceneId];
      delete attachFiles[sceneId];
      delete ocrRawResults[sceneId];
      delete debouncedLLM[sid];
      delete extraFkFieldNames[sid];

      const lbl = document.getElementById('scene-opt-' + sid);
      if (lbl) { lbl.classList.remove('checked'); lbl.querySelector('input').checked = false; }
      updateBlocksLayout();
      updateTotalFee();
    }

    // 费控映射联动展开/收起
    function syncFkDetails(triggerSid, isOpen) {
      selectedSceneIds.forEach(id => {
        const sid = getSceneSid(id);
        if (sid === triggerSid) return;
        const el = document.getElementById('fk-details-' + sid);
        if (el) el.open = isOpen;
      });
    }

    // 总费用统计
    function updateTotalFee() {
      const bar = document.getElementById('totalFeeBar');
      if (selectedSceneIds.length === 0) { bar.style.display = 'none'; return; }
      let total = 0;
      selectedSceneIds.forEach(id => {
        const val = parseFloat(document.getElementById('s_amount-' + getSceneSid(id))?.value) || 0;
        total += val;
      });
      bar.style.display = 'flex';
      document.getElementById('totalFeeAmount').textContent = '¥' + total.toFixed(2);
      document.getElementById('totalFeeCount').textContent = `（${selectedSceneIds.length} 个场景）`;
    }

    function updateBlocksLayout() {
      const count = selectedSceneIds.length;
      document.getElementById('sceneBlocksContainer').classList.toggle('compact', count > 2);
      document.getElementById('sceneBlocksScroll').classList.toggle('scrollable', count > 4);
    }

    // ─── 渲染单个场景块 ──────────────────────────────────────────
    function renderSceneBlock(record) {
      const id = record.id;
      const f = record.fields;
      const sid = getSceneSid(id);
      const sceneName = escHtml(f['场景说明'] || '-');
      const today = new Date().toISOString().slice(0, 10);

      const fkDocType = escHtml(f['费控单据类型'] || '');
      const legal     = escHtml(f['法律主体'] || '');
      const supplier  = escHtml(f['供应商/收款方'] || '');
      const contract  = escHtml(f['合同编号'] || '');
      const fkFeeType = escHtml(f['费控费用类型'] || '');
      const fkFeeItem = escHtml(f['费控费用项目'] || '');
      const fkUnit    = escHtml(f['费控战斗单元'] || '');
      const fkDept    = escHtml(f['费控分摊部门'] || '');
      const fkCash    = escHtml(f['费控现金事务'] || '');
      const hasUnit   = f['费控战斗单元'] && f['费控战斗单元'] !== '空';
      const linkProject = hasUnit ? '是' : '否';

      // 将 Teable 各类型字段值统一转为可显示字符串
      function fkVal(v) {
        if (v === null || v === undefined || v === '') return '';
        if (Array.isArray(v)) return v.map(i => i?.title || String(i)).filter(Boolean).join('、');
        if (typeof v === 'object') return v.title || '';
        return String(v);
      }

      // 排除已在表单中硬编码处理的字段，剩余有值字段动态展示
      const KNOWN_FK = new Set([
        '场景说明','费用类型','负责人','跟进人',
        '费控单据类型','法律主体','供应商/收款方','合同编号',
        '费控费用类型','费控费用项目','费控战斗单元','费控分摊部门','费控现金事务'
      ]);
      const extraFkList = Object.entries(f)
        .filter(([k, v]) => !KNOWN_FK.has(k) && fkVal(v) !== '')
        .map(([k, v]) => ({ name: k, val: escHtml(fkVal(v)) }));
      extraFkFieldNames[sid] = extraFkList.map(x => x.name);

      // 两列布局，不足两个时右侧留空
      const extraFkHtml = (() => {
        let html = '';
        for (let i = 0; i < extraFkList.length; i += 2) {
          const a = extraFkList[i], b = extraFkList[i + 1];
          html += `<div class="form-row">
            <div class="form-group">
              <label class="form-label auto-fill-label">${escHtml(a.name)}</label>
              <input class="form-input auto-filled" id="s_extra_${sid}_${i}" readonly value="${a.val}" placeholder="-">
            </div>
            ${b ? `<div class="form-group">
              <label class="form-label auto-fill-label">${escHtml(b.name)}</label>
              <input class="form-input auto-filled" id="s_extra_${sid}_${i + 1}" readonly value="${b.val}" placeholder="-">
            </div>` : '<div class="form-group"></div>'}
          </div>`;
        }
        return html;
      })();

      return `
<div class="scene-block" id="scene-block-${sid}" data-scene-id="${id}">
  <div class="scene-block-header">
    <span class="scene-block-title">${sceneName}</span>
    <button class="scene-block-remove" onclick="removeScene('${id}')" title="移除此场景">✕</button>
  </div>
  <div class="scene-block-body">

    <!-- 发票信息 -->
    <div class="form-section">
      <div class="form-section-title">发票信息</div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">发票<span class="required">*</span></label>
        <div class="upload-zone" id="uploadZone-${sid}" onclick="document.getElementById('fileInput-${sid}').click()">
          <div class="upload-icon">&#128206;</div>
          <div class="upload-text">点击或拖拽上传发票（JPG/PNG/PDF，最大 5MB）</div>
          <div class="upload-preview" id="uploadPreview-${sid}"></div>
        </div>
        <input type="file" id="fileInput-${sid}" accept="image/*,.pdf" style="display:none" onchange="handleFileUpload(this,'${id}')">
      </div>
      <div id="ocrResult-${sid}" class="ocr-result" style="display:none">
        <b>OCR 识别结果:</b> <span id="ocrText-${sid}"></span>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group">
          <label class="form-label">发票类型</label>
          <select class="form-select" id="s_invoiceType-${sid}">
            <option value="">待识别</option>
            <option>电子发票（增值税专用发票）</option>
            <option>电子发票（增值税普通发票）</option>
            <option>增值税专用发票</option>
            <option>增值税普通发票</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">税率</label>
          <input class="form-input" id="s_taxRate-${sid}" placeholder="如 0.06">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">单价</label>
          <input class="form-input" type="number" step="0.01" id="s_amount-${sid}" placeholder="金额（元）">
        </div>
      </div>
    </div>

    <!-- 费用信息 -->
    <div class="form-section">
      <div class="form-section-title">费用信息</div>
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">事由描述<span class="required">*</span><span id="llm-status-${sid}" class="llm-status"></span></label>
          <textarea class="form-textarea" id="s_reason-${sid}" placeholder="申请报销XX年XX月XX日费用 到 XX年XX月XX日费用" oninput="handleReasonInput(this,'${sid}')"></textarea>
          <div class="form-hint">示例：申请报销2026年1月1日房租费用 到 2026年3月31日房租费用，含物业附加费</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">受益日期从 <span class="auto-fill-badge">自动解析</span></label>
          <input class="form-input" type="date" id="s_benefitFrom-${sid}">
        </div>
        <div class="form-group">
          <label class="form-label">受益日期到 <span class="auto-fill-badge">自动解析</span></label>
          <input class="form-input" type="date" id="s_benefitTo-${sid}">
        </div>
      </div>
      <div style="display:none">
        <input type="date" id="s_period-${sid}" value="${today}">
      </div>
    </div>

    <!-- 附件上传 -->
    <div class="form-section">
      <div class="form-section-title">附件上传</div>
      <div class="form-group">
        <div class="upload-zone" id="attachZone-${sid}" onclick="document.getElementById('attachInput-${sid}').click()">
          <div class="upload-icon">&#128206;</div>
          <div class="upload-text">点击上传附件（可选）</div>
          <div class="upload-preview" id="attachPreview-${sid}"></div>
        </div>
        <input type="file" id="attachInput-${sid}" accept="image/*,.pdf" style="display:none" onchange="handleAttach(this,'${id}')">
      </div>
    </div>

    <!-- 费控映射（折叠，自动填充） -->
    <details class="collapsible" id="fk-details-${sid}" ontoggle="syncFkDetails('${sid}', this.open)">
      <summary class="form-section-title">
        <span class="collapse-caret">&#9656;</span>
        费控映射 <span class="auto-fill-badge">自动填充</span>
      </summary>
      <div style="padding-top:8px">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label auto-fill-label">费控单据类型</label>
            <input class="form-input auto-filled" id="s_fk_docType-${sid}" readonly value="${fkDocType}" placeholder="-">
          </div>
          <div class="form-group">
            <label class="form-label auto-fill-label">法律主体</label>
            <input class="form-input auto-filled" id="s_legal-${sid}" readonly value="${legal}" placeholder="-">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label auto-fill-label">供应商/收款方</label>
            <input class="form-input auto-filled" id="s_supplier-${sid}" readonly value="${supplier}" placeholder="-">
          </div>
          <div class="form-group">
            <label class="form-label auto-fill-label">合同编号</label>
            <input class="form-input auto-filled" id="s_contract-${sid}" readonly value="${contract}" placeholder="-">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label auto-fill-label">费控费用类型</label>
            <input class="form-input auto-filled" id="s_fk_feeType-${sid}" readonly value="${fkFeeType}" placeholder="-">
          </div>
          <div class="form-group">
            <label class="form-label auto-fill-label">费控费用项目</label>
            <input class="form-input auto-filled" id="s_fk_feeItem-${sid}" readonly value="${fkFeeItem}" placeholder="-">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label auto-fill-label">是否关联项目/专项/战斗单元</label>
            <input class="form-input auto-filled" id="s_linkProject-${sid}" readonly value="${linkProject}" placeholder="-">
          </div>
          <div class="form-group">
            <label class="form-label auto-fill-label">费控战斗单元</label>
            <input class="form-input auto-filled" id="s_fk_unit-${sid}" readonly value="${fkUnit}" placeholder="-">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label auto-fill-label">费控分摊部门</label>
            <input class="form-input auto-filled" id="s_fk_dept-${sid}" readonly value="${fkDept}" placeholder="-">
          </div>
          <div class="form-group">
            <label class="form-label auto-fill-label">费控现金事务</label>
            <input class="form-input auto-filled" id="s_fk_cash-${sid}" readonly value="${fkCash}" placeholder="-">
          </div>
        </div>
        ${extraFkHtml}
      </div>
    </details>

  </div>
</div>`;
    }

    // 金额变动时更新总费用
    document.getElementById('sceneBlocksContainer').addEventListener('input', function(e) {
      if (e.target && e.target.id && e.target.id.startsWith('s_amount-')) updateTotalFee();
    });

    // ─── 事由描述 → LLM 解析日期 ────────────────────────────────
    function handleReasonInput(el, sid) {
      if (!debouncedLLM[sid]) {
        debouncedLLM[sid] = debounce(function(val) {
          if (!val.trim()) return;
          parseDatesWithLLM(val, sid);
        }, 800);
      }
      debouncedLLM[sid](el.value);
    }

    async function parseDatesWithLLM(text, sid) {
      const statusEl = document.getElementById('llm-status-' + sid);
      if (statusEl) { statusEl.textContent = '解析中…'; statusEl.className = 'llm-status parsing'; }
      try {
        const resp = await fetch('http://ai-service.tal.com/openai-compatible/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer 300000485:61b228c575d42cbd37a266636c5b7364',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'gpt-5-chat',
            messages: [
              { role: 'system', content: 'You are a helpful assistant.' },
              {
                role: 'user',
                content: `从以下费用事由描述中提取受益日期范围（起始日和截止日），只返回JSON，格式：{"from":"YYYY-MM-DD","to":"YYYY-MM-DD"}，无法识别的字段返回null，不要输出任何其他内容。\n事由：${text}`
              }
            ]
          })
        });
        const data = await resp.json();
        const content = data.choices?.[0]?.message?.content || '';
        const match = content.match(/\{[\s\S]*?\}/);
        if (match) {
          const parsed = JSON.parse(match[0]);
          if (parsed.from) document.getElementById('s_benefitFrom-' + sid).value = parsed.from;
          if (parsed.to)   document.getElementById('s_benefitTo-' + sid).value   = parsed.to;
          if (statusEl) { statusEl.textContent = '✓ 已解析'; statusEl.className = 'llm-status success'; }
          return;
        }
      } catch (_) {
        // LLM 不可用（混合内容拦截/网络超时），降级到正则
      }
      // 降级：正则解析
      const fallback = parseBenefitDates(text);
      if (fallback.from || fallback.to) {
        if (fallback.from) document.getElementById('s_benefitFrom-' + sid).value = fallback.from;
        if (fallback.to)   document.getElementById('s_benefitTo-' + sid).value   = fallback.to;
        if (statusEl) { statusEl.textContent = '✓ 已解析（本地）'; statusEl.className = 'llm-status success'; }
      } else {
        if (statusEl) { statusEl.textContent = ''; statusEl.className = 'llm-status'; }
        showToast('日期自动解析失败，请手动填写受益日期', 'warning');
      }
    }

    // ─── 拖拽绑定 ────────────────────────────────────────────────
    function setupUploadZone(sceneId, sid) {
      const zone = document.getElementById('uploadZone-' + sid);
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) processInvoice(e.dataTransfer.files[0], sceneId);
      });

      const attachZone = document.getElementById('attachZone-' + sid);
      attachZone.addEventListener('dragover', e => { e.preventDefault(); attachZone.classList.add('dragover'); });
      attachZone.addEventListener('dragleave', () => attachZone.classList.remove('dragover'));
      attachZone.addEventListener('drop', e => {
        e.preventDefault(); attachZone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) processAttach(e.dataTransfer.files[0], sceneId);
      });
    }

    // ─── 发票上传 + OCR ──────────────────────────────────────────
    function handleFileUpload(input, sceneId) {
      if (input.files[0]) processInvoice(input.files[0], sceneId);
    }

    function processInvoice(file, sceneId) {
      if (file.size > 5 * 1024 * 1024) { showToast('文件不能超过 5MB', 'error'); return; }
      const sid = getSceneSid(sceneId);
      invoiceFiles[sceneId] = file;
      const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
      const reader = new FileReader();
      reader.onload = async () => {
        const previewImg = isPdf ? '' : `<img src="${reader.result}" style="max-width:100%;max-height:150px;border-radius:var(--radius);display:block;margin-bottom:6px">`;
        document.getElementById('uploadPreview-' + sid).innerHTML =
          previewImg +
          `<div class="upload-file-info">
            <span class="upload-file-name">📄 ${escHtml(file.name)} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">(${(file.size/1024).toFixed(0)}KB)</span></span>
            <button class="upload-file-delete" onclick="deleteInvoice('${sceneId}')" title="删除发票">✕</button>
          </div>`;

        const ocrDiv = document.getElementById('ocrResult-' + sid);
        ocrDiv.style.display = 'block';
        ocrDiv.className = 'ocr-result ocr-loading';
        document.getElementById('ocrText-' + sid).textContent = '正在识别发票...';

        try {
          const result = await ocrVatInvoice(file);
          applyOcrResult(result, sceneId, sid);
        } catch (e) {
          ocrDiv.className = 'ocr-result';
          document.getElementById('ocrText-' + sid).textContent = '识别失败: ' + e.message;
          showToast('识别失败', 'error');
        }
      };
      reader.readAsDataURL(file);
    }

    function applyOcrResult(result, sceneId, sid) {
      ocrRawResults[sceneId] = JSON.stringify(result);
      const invoiceType  = result.invoiceType  || '';
      const totalAmount  = result.totalAmount  || '';
      const taxRate      = result.taxRate      || '';
      const sellerName   = result.sellerName   || '';
      const purchaserName = result.purchaserName || '';

      if (invoiceType) {
        const typeMap = {
          '专用发票': '增值税专用发票',
          '普通发票': '增值税普通发票',
          '电子专用发票': '电子发票（增值税专用发票）',
          '电子普通发票': '电子发票（增值税普通发票）',
          '增值税电子专用发票': '电子发票（增值税专用发票）',
          '增值税电子普通发票': '电子发票（增值税普通发票）',
        };
        const mapped = typeMap[invoiceType] || invoiceType;
        const sel = document.getElementById('s_invoiceType-' + sid);
        for (const opt of sel.options) {
          if (opt.value === mapped || opt.textContent.includes(invoiceType)) { sel.value = opt.value; break; }
        }
      }

      if (taxRate) {
        let rate = String(taxRate).replace('%', '').replace('％', '');
        if (parseFloat(rate) >= 1) rate = (parseFloat(rate) / 100).toFixed(2);
        document.getElementById('s_taxRate-' + sid).value = rate;
      }

      if (totalAmount) {
        document.getElementById('s_amount-' + sid).value = parseFloat(totalAmount) || '';
      }

      if (sellerName) {
        const supplierEl = document.getElementById('s_supplier-' + sid);
        const cur = supplierEl.value;
        if (!cur) {
          supplierEl.value = sellerName;
        } else if (!cur.includes(sellerName) && !sellerName.includes(cur)) {
          if (confirm(`OCR 识别供应商"${sellerName}"与配置"${cur}"不同，是否替换？`)) {
            supplierEl.value = sellerName;
          }
        }
      }

      if (purchaserName) {
        const legalEl = document.getElementById('s_legal-' + sid);
        const cur = legalEl.value;
        if (!cur) {
          legalEl.value = purchaserName;
        } else if (!cur.includes(purchaserName) && !purchaserName.includes(cur)) {
          showToast(`注意：OCR 购方"${purchaserName}"与配置法律主体不一致`, 'warn');
        }
      }

      const ocrDiv = document.getElementById('ocrResult-' + sid);
      ocrDiv.style.display = 'block';
      ocrDiv.className = 'ocr-result';
      document.getElementById('ocrText-' + sid).textContent =
        `类型: ${invoiceType || '-'} | 金额: ${totalAmount || '-'} | 税率: ${taxRate || '-'} | 销方: ${sellerName || '-'}`;
    }

    // ─── 附件上传 ────────────────────────────────────────────────
    function handleAttach(input, sceneId) {
      if (input.files[0]) processAttach(input.files[0], sceneId);
    }

    function processAttach(file, sceneId) {
      if (file.size > 5 * 1024 * 1024) { showToast('附件不能超过 5MB', 'error'); return; }
      const sid = getSceneSid(sceneId);
      attachFiles[sceneId] = file;
      const reader = new FileReader();
      reader.onload = () => {
        const previewImg = file.type.startsWith('image/') ? `<img src="${reader.result}" style="max-width:100%;max-height:120px;border-radius:var(--radius);display:block;margin-bottom:6px">` : '';
        document.getElementById('attachPreview-' + sid).innerHTML =
          previewImg +
          `<div class="upload-file-info">
            <span class="upload-file-name">📎 ${escHtml(file.name)} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">(${(file.size/1024).toFixed(0)}KB)</span></span>
            <button class="upload-file-delete" onclick="deleteAttach('${sceneId}')" title="删除附件">✕</button>
          </div>`;
        showToast('附件已上传', 'info');
      };
      reader.readAsDataURL(file);
    }

    // ─── 删除上传文件 ────────────────────────────────────────────
    function deleteInvoice(sceneId) {
      delete invoiceFiles[sceneId];
      const sid = getSceneSid(sceneId);
      document.getElementById('uploadPreview-' + sid).innerHTML = '';
      document.getElementById('fileInput-' + sid).value = '';
      const ocrDiv = document.getElementById('ocrResult-' + sid);
      if (ocrDiv) { ocrDiv.style.display = 'none'; ocrDiv.className = 'ocr-result'; }
    }

    function deleteAttach(sceneId) {
      delete attachFiles[sceneId];
      const sid = getSceneSid(sceneId);
      document.getElementById('attachPreview-' + sid).innerHTML = '';
      document.getElementById('attachInput-' + sid).value = '';
    }

    // ─── 提交 ────────────────────────────────────────────────────
    async function submitExpense() {
      const feeType = document.getElementById('s_type').value;

      if (!feeType) { showToast('请选择费用类型', 'error'); return; }
      if (selectedSceneIds.length === 0) { showToast('请至少选择一个场景', 'error'); return; }

      for (const sceneId of selectedSceneIds) {
        const sid = getSceneSid(sceneId);
        const reason = document.getElementById('s_reason-' + sid)?.value.trim();
        if (!reason) { showToast('请填写每个场景的事由描述', 'error'); return; }
        if (!invoiceFiles[sceneId]) { showToast('请为每个场景上传发票', 'error'); return; }
      }

      const user = getCurrentUser();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '提交中...';

      try {
        // 一次性取台账，确保序号唯一
        const ledgers = await teableGet(TABLE_LEDGER, true);
        let maxNo = ledgers.reduce((m, r) => Math.max(m, r.fields['编号'] || 0), 0);

        const isAccrual = document.getElementById('s_isAccrual').value;
        const total = selectedSceneIds.length;

        for (let i = 0; i < total; i++) {
          const sceneId = selectedSceneIds[i];
          const sid = getSceneSid(sceneId);
          const record = configRecords.find(r => r.id === sceneId);
          const f = record.fields;
          const sceneName = f['场景说明'] || '-';
          const ledgerNo = ++maxNo;
          const amount = parseFloat(document.getElementById('s_amount-' + sid).value);
          const reason = document.getElementById('s_reason-' + sid).value.trim();

          btn.textContent = `上传附件 (${i+1}/${total})...`;
          const [invoiceAttachment, attachAttachment] = await Promise.all([
            teableUploadAttachment(invoiceFiles[sceneId]),
            attachFiles[sceneId] ? teableUploadAttachment(attachFiles[sceneId]) : Promise.resolve(null),
          ]);

          btn.textContent = `提交中 (${i+1}/${total})...`;

          // 收集本场景动态额外字段的值
          const extraFkData = {};
          (extraFkFieldNames[sid] || []).forEach((name, idx) => {
            const el = document.getElementById(`s_extra_${sid}_${idx}`);
            if (el && el.value) extraFkData[name] = el.value;
          });

          await teableCreate(TABLE_LEDGER, {
            '编号': ledgerNo,
            '账期': document.getElementById('s_period-' + sid).value || new Date().toISOString(),
            '付款金额': amount || 0,
            '预提/实付': isAccrual === '是' ? '预提' : '实付',
            '当前进度': isAccrual === '是' ? '待预提' : '费控提报中',
            '提交人': user.account,
            '提交费控日期': new Date().toISOString(),
            '费用类型': feeType,
            '费用场景说明': sceneName,
            '负责业务人': user.account,
            '场景配置ID': sceneId,
            ...extraFkData,
          });

          await teableCreate(TABLE_SUBMIT, {
            '费用类型': feeType,
            '场景说明': sceneName,
            '费控单据类型': document.getElementById('s_fk_docType-' + sid).value,
            '是否预提': isAccrual,
            '法律主体': document.getElementById('s_legal-' + sid).value,
            '供应商/收款方': document.getElementById('s_supplier-' + sid).value,
            '费用承担期间': document.getElementById('s_period-' + sid).value || null,
            '类型': document.getElementById('s_splitType').value,
            '纸质单据': document.getElementById('s_paper').value,
            '是否员工垫付': document.getElementById('s_selfPay').value,
            '事由描述': reason,
            '费控费用类型': document.getElementById('s_fk_feeType-' + sid).value,
            '费控费用项目': document.getElementById('s_fk_feeItem-' + sid).value,
            '单价': amount || null,
            '是否关联项目': document.getElementById('s_linkProject-' + sid).value || '否',
            '费控战斗单元': document.getElementById('s_fk_unit-' + sid).value,
            '费控分摊部门': document.getElementById('s_fk_dept-' + sid).value,
            '费控现金事务': document.getElementById('s_fk_cash-' + sid).value,
            '发票类型': document.getElementById('s_invoiceType-' + sid).value,
            '税率': document.getElementById('s_taxRate-' + sid).value,
            '受益日期从': document.getElementById('s_benefitFrom-' + sid).value || null,
            '受益日期到': document.getElementById('s_benefitTo-' + sid).value || null,
            '发票图片': [invoiceAttachment],
            '附件': attachAttachment ? [attachAttachment] : [],
            '合同编号': document.getElementById('s_contract-' + sid).value,
            '付款方式': document.getElementById('s_payMethod').value,
            '创建人': user.account,
            '创建时间': new Date().toISOString(),
            '场景配置ID': sceneId,
            '台账编号': String(ledgerNo),
            'OCR结果': ocrRawResults[sceneId] || '',
            ...extraFkData,
          });

          trackAction('提交费用:' + feeType + '-' + sceneName, 'submit.html');
        }

        showToast(total > 1 ? `费用提报成功！共提交 ${total} 条` : '费用提报成功！');
        setTimeout(() => location.href = 'ledger.html', 1500);
      } catch (e) {
        showToast('提交失败: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '提交费用';
      }
    }
  </script>
</body>
</html>
