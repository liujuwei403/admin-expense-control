<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快提快报 - 费用台账</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar" id="topbar"></header>
  <main class="main">
    <div class="card">
      <div class="filter-bar">
        <select class="form-select" id="filterType"><option value="">全部类型</option></select>
        <select class="form-select" id="filterProgress">
          <option value="">全部进度</option>
          <option>费控提报中</option>
          <option>费控提报完成</option>
          <option>已驳回待修改</option>
          <option>已撤回</option>
        </select>
        <select class="form-select" id="filterOverdue">
          <option value="">全部状态</option><option>逾期</option><option>正常</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>编号</th><th>费用类型</th><th>场景</th><th>金额</th>
            <th>进度</th><th>提交人</th><th>操作</th>
          </tr></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-text">暂无台账记录</div>
      </div>
    </div>
  </main>

  <!-- 修改弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title" id="editModalTitle">修改费用提报</div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">事由描述<span class="required">*</span></label>
        <textarea class="form-textarea" id="edit_reason" rows="3"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-group">
          <label class="form-label">金额（元）</label>
          <input class="form-input" type="number" step="0.01" id="edit_amount">
        </div>
        <div class="form-group">
          <label class="form-label">发票类型</label>
          <select class="form-select" id="edit_invoiceType">
            <option value="">待识别</option>
            <option>电子发票（增值税专用发票）</option>
            <option>电子发票（增值税普通发票）</option>
            <option>增值税专用发票</option>
            <option>增值税普通发票</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">受益日期从</label>
          <input class="form-input" type="date" id="edit_benefitFrom">
        </div>
        <div class="form-group">
          <label class="form-label">受益日期到</label>
          <input class="form-input" type="date" id="edit_benefitTo">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">重新上传发票（可选，不传则保留原发票）</label>
        <input type="file" id="edit_invoiceFile" accept="image/*,.pdf"
               style="font-size:13px;color:var(--text-muted)">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">重新上传附件（可选，不传则保留原附件）</label>
        <input type="file" id="edit_attachFile" accept="image/*,.pdf"
               style="font-size:13px;color:var(--text-muted)">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
        <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">重新提交</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    if (!requireLogin()) throw '';
    renderNav('ledger.html');

    let allLedgers = [];
    let editingLedgerId = null;
    let editingSubmitId = null;

    (async () => {
      try {
        allLedgers = await teableGet(TABLE_LEDGER);
        const types = [...new Set(allLedgers.map(r => r.fields['费用类型']).filter(Boolean))];
        const filterType = document.getElementById('filterType');
        types.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t; opt.textContent = t;
          filterType.appendChild(opt);
        });
        renderTable();
      } catch (e) {
        showToast('加载台账失败: ' + e.message, 'error');
      }
    })();

    document.getElementById('filterType').addEventListener('change', renderTable);
    document.getElementById('filterProgress').addEventListener('change', renderTable);
    document.getElementById('filterOverdue').addEventListener('change', renderTable);

    function renderTable() {
      const fType = document.getElementById('filterType').value;
      const fProgress = document.getElementById('filterProgress').value;
      const fOverdue = document.getElementById('filterOverdue').value;

      let data = allLedgers;
      if (fType) data = data.filter(r => r.fields['费用类型'] === fType);
      if (fProgress) data = data.filter(r => r.fields['当前进度'] === fProgress);
      if (fOverdue) data = data.filter(r => checkOverdue(r) === fOverdue);

      data.sort((a, b) => (b.fields['编号'] || 0) - (a.fields['编号'] || 0));

      if (data.length === 0) {
        document.getElementById('ledgerBody').innerHTML = '';
        document.getElementById('emptyState').style.display = '';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      const user = getCurrentUser();
      document.getElementById('ledgerBody').innerHTML = data.map(r => {
        const f = r.fields;
        const od = checkOverdue(r);
        const progress = f['当前进度'];
        const OLD_TERMINAL = ['已付款','待付款','预提完成','待收账单','已收账单','待预提'];
        const terminated = progress === '已撤回' || progress === '费控提报完成' || OLD_TERMINAL.includes(progress);
        const canWithdraw = !terminated && (user.account === f['提交人'] || isAdmin());
        const canEdit     = progress === '已驳回待修改' && (user.account === f['提交人'] || isAdmin());
        const actionBtns = [
          canEdit     ? `<button class="btn btn-sm btn-primary" onclick="openEditModal('${r.id}')">修改</button>` : '',
          canWithdraw ? `<button class="btn btn-sm btn-danger"  onclick="withdrawRecord('${r.id}')">撤回</button>` : '',
        ].filter(Boolean).join('') || '-';
        return `<tr>
          <td>${f['编号'] || '-'}</td>
          <td>${f['费用类型'] || '-'}</td>
          <td>${f['费用场景说明'] || '-'}</td>
          <td>${formatMoney(f['付款金额'])}</td>
          <td>${statusBadge(f['当前进度'])}</td>
          <td>${f['提交人'] || '-'}</td>
          <td style="white-space:nowrap">${actionBtns}</td>
        </tr>`;
      }).join('');
    }

    async function openEditModal(ledgerId) {
      const record = allLedgers.find(r => r.id === ledgerId);
      if (!record) return;
      const f = record.fields;
      editingLedgerId = ledgerId;
      editingSubmitId = null;

      document.getElementById('editModalTitle').textContent =
        `修改提报 #${f['编号']} — ${f['费用场景说明'] || ''}`;

      try {
        const submits = await teableGet(TABLE_SUBMIT);
        const match = submits.find(s => s.fields['台账编号'] === String(f['编号']));
        if (match) {
          editingSubmitId = match.id;
          const sf = match.fields;
          document.getElementById('edit_reason').value      = sf['事由描述'] || '';
          document.getElementById('edit_amount').value      = sf['单价'] || f['付款金额'] || '';
          document.getElementById('edit_invoiceType').value = sf['发票类型'] || '';
          document.getElementById('edit_benefitFrom').value = sf['受益日期从'] || '';
          document.getElementById('edit_benefitTo').value   = sf['受益日期到'] || '';
        } else {
          document.getElementById('edit_amount').value      = f['付款金额'] || '';
          document.getElementById('edit_reason').value      = '';
          document.getElementById('edit_invoiceType').value = '';
          document.getElementById('edit_benefitFrom').value = '';
          document.getElementById('edit_benefitTo').value   = '';
        }
      } catch {}

      document.getElementById('edit_invoiceFile').value = '';
      document.getElementById('edit_attachFile').value  = '';
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    async function saveEdit() {
      const reason = document.getElementById('edit_reason').value.trim();
      if (!reason) { showToast('请填写事由描述', 'error'); return; }
      const amount = parseFloat(document.getElementById('edit_amount').value);
      if (isNaN(amount) || amount < 0) { showToast('金额不能为空或负数', 'error'); return; }

      const btn = document.getElementById('editSaveBtn');
      btn.disabled = true; btn.textContent = '提交中...';

      try {
        const invoiceInput = document.getElementById('edit_invoiceFile');
        const attachInput  = document.getElementById('edit_attachFile');
        let invoiceAttachment = null;
        let attachAttachment  = null;

        if (invoiceInput.files[0]) {
          if (invoiceInput.files[0].size > 5 * 1024 * 1024) {
            showToast('发票文件不能超过 5MB', 'error');
            btn.disabled = false; btn.textContent = '重新提交';
            return;
          }
          invoiceAttachment = await teableUploadAttachment(invoiceInput.files[0]);
        }
        if (attachInput.files[0]) {
          if (attachInput.files[0].size > 5 * 1024 * 1024) {
            showToast('附件不能超过 5MB', 'error');
            btn.disabled = false; btn.textContent = '重新提交';
            return;
          }
          attachAttachment = await teableUploadAttachment(attachInput.files[0]);
        }

        if (editingSubmitId) {
          const submitFields = {
            '事由描述': reason,
            '单价': amount,
            '发票类型': document.getElementById('edit_invoiceType').value,
            '受益日期从': document.getElementById('edit_benefitFrom').value || null,
            '受益日期到': document.getElementById('edit_benefitTo').value || null,
          };
          if (invoiceAttachment) submitFields['发票图片'] = [invoiceAttachment];
          if (attachAttachment)  submitFields['附件']     = [attachAttachment];
          await teableUpdate(TABLE_SUBMIT, editingSubmitId, submitFields);
        }

        await teableUpdate(TABLE_LEDGER, editingLedgerId, {
          '付款金额': amount,
          '当前进度': '费控提报中',
          '备注': '',
        });

        showToast('已重新提交，等待审批');
        trackAction('修改重提:' + editingLedgerId, 'ledger.html');
        closeEditModal();
        allLedgers = await teableGet(TABLE_LEDGER, true);
        renderTable();
      } catch (e) {
        showToast('提交失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = '重新提交';
      }
    }

    async function withdrawRecord(id) {
      const record = allLedgers.find(r => r.id === id);
      if (!record) return;
      const f = record.fields;
      const user = getCurrentUser();
      if (f['当前进度'] === '费控提报完成' || f['当前进度'] === '已撤回') return;
      if (user.account !== f['提交人'] && !isAdmin()) { showToast('无权限撤回', 'error'); return; }
      if (!confirm(`确认撤回编号 ${f['编号']} 的费用提报？`)) return;
      try {
        await teableUpdate(TABLE_LEDGER, id, {
          '当前进度': '已撤回',
          '备注': (f['备注'] ? f['备注'] + ' | ' : '') + `撤回于 ${new Date().toLocaleString('zh-CN')}`,
        });
        showToast('已撤回');
        trackAction('撤回台账:' + f['编号'], 'ledger.html');
        allLedgers = await teableGet(TABLE_LEDGER, true);
        renderTable();
      } catch (e) {
        showToast('撤回失败: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
