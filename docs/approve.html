<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快提快报 - 审批中心</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar" id="topbar"></header>
  <main class="main">
    <div class="card">
      <div class="tabs" style="margin-bottom:12px">
        <button class="tab active" onclick="setFilter('all')">全部</button>
        <button class="tab" onclick="setFilter('pending')">待审批</button>
        <button class="tab" onclick="setFilter('done')">已处理</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>编号</th><th>费用类型</th><th>场景</th><th>金额</th><th>进度</th><th>提交人</th><th>操作</th>
          </tr></thead>
          <tbody id="approveBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-text">暂无审批记录</div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    if (!requireLogin()) throw '';
    renderNav('approve.html');

    let allLedgers = [];
    let currentFilter = 'all';

    const PENDING_STATE = '费控提报中';
    const FINAL_STATES = ['费控提报完成', '已付款'];

    (async () => {
      try {
        allLedgers = await teableGet(TABLE_LEDGER);
        renderList();
      } catch (e) {
        showToast('加载数据失败: ' + e.message, 'error');
      }
    })();

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[{ all: 0, pending: 1, done: 2 }[filter]].classList.add('active');
      renderList();
    }

    function renderList() {
      const RELEVANT = [PENDING_STATE, ...FINAL_STATES];
      let data = allLedgers.filter(r => RELEVANT.includes(r.fields['当前进度']));

      if (currentFilter === 'pending') data = data.filter(r => r.fields['当前进度'] === PENDING_STATE);
      if (currentFilter === 'done')    data = data.filter(r => FINAL_STATES.includes(r.fields['当前进度']));

      data.sort((a, b) => (b.fields['编号'] || 0) - (a.fields['编号'] || 0));

      if (data.length === 0) {
        document.getElementById('approveBody').innerHTML = '';
        document.getElementById('emptyState').style.display = '';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      document.getElementById('approveBody').innerHTML = data.map(r => {
        const f = r.fields;
        const isPending = f['当前进度'] === PENDING_STATE;
        const actionBtn = isPending
          ? `<button class="btn btn-sm btn-danger"  onclick="doApprove('${r.id}','reject')">驳回</button>
             <button class="btn btn-sm btn-success" onclick="doApprove('${r.id}','approve')">通过</button>`
          : `<span style="color:var(--success);font-size:12px">已处理</span>`;
        return `<tr>
          <td>${f['编号'] || '-'}</td>
          <td>${f['费用类型'] || '-'}</td>
          <td>${f['费用场景说明'] || '-'}</td>
          <td>${formatMoney(f['付款金额'])}</td>
          <td>${statusBadge(f['当前进度'])}</td>
          <td>${f['提交人'] || '-'}</td>
          <td style="white-space:nowrap">${actionBtn}</td>
        </tr>`;
      }).join('');
    }

    async function doApprove(id, action) {
      if (!isApprover()) { showToast('无审批权限', 'error'); return; }
      const record = allLedgers.find(r => r.id === id);
      if (!record) return;
      const f = record.fields;

      const verb = action === 'approve' ? '通过' : '驳回';
      const remark = prompt(`${verb}审批 #${f['编号']}（${f['费用场景说明'] || ''}）\n请填写审批意见（可留空）：`) ?? null;
      if (remark === null) return;

      try {
        if (action === 'approve') {
          await teableUpdate(TABLE_LEDGER, id, {
            '当前进度': '费控提报完成',
            '备注': remark ? ('审批通过: ' + remark) : '审批通过',
          });
          showToast('已通过');
        } else {
          await teableUpdate(TABLE_LEDGER, id, {
            '当前进度': '已驳回待修改',
            '备注': remark ? ('驳回: ' + remark) : '已驳回',
          });
          showToast('已驳回', 'warn');
        }
        trackAction(`${verb}审批:${f['编号']}`, 'approve.html');
        allLedgers = await teableGet(TABLE_LEDGER, true);
        renderList();
      } catch (e) {
        showToast('操作失败: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
